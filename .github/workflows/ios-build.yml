name: iOS Build (Unsigned IPA)

# 수동 실행 전용 — Actions 탭에서 "Run workflow" 버튼으로 트리거.
# 결과물: ptodolist-unsigned.ipa (코드 서명 없음)
# 설치 방법: Sideloadly / AltStore 로 본인 Apple ID 재서명 후 iPhone 에 설치.

on:
  workflow_dispatch:

jobs:
  build:
    name: Build unsigned iOS IPA
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter --version && flutter doctor -v

      - name: Install dependencies
        working-directory: ptodolist_front
        run: flutter pub get

      - name: Build iOS (release, no codesign)
        working-directory: ptodolist_front
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        working-directory: ptodolist_front/build/ios/iphoneos
        run: |
          mkdir -p Payload
          cp -R Runner.app Payload/
          zip -qr ptodolist-unsigned.ipa Payload
          rm -rf Payload
          ls -la ptodolist-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ptodolist-ios-unsigned
          path: ptodolist_front/build/ios/iphoneos/ptodolist-unsigned.ipa
          retention-days: 14
          if-no-files-found: error
